- volume: muse
  title: muse ariadne
  desc: My entries for a writing club that posts new prompts weekly!! Not a comic, just too lazy to put it somewhere else.
  files:
  - issue: "2024-02-05"
    date: 2024-10-19
    title: Writing is Hard
    desc: <b>Prompt:</b> Write about what ways writing plays a role in your life-- why do you like it? is it hard? what's your relationship with it? be as abstract or direct as you'd like.
    pages:
      - txt: "2024-02-05.html"
  
  - issue: "2024-02-26"
    date: 2024-10-29
    title: Blue Bird
    thumb: blue-bird.png
    desc: >-
      <b>Prompt:</b> Write about echoes, sound, and reverberation. what is an echoвҖ“ just sound or something more? how can it reverberate through past, present, and future? can emotion be an echo in that way? what else can be?


      ----


      Yes i know this suck. sorry to any poets reading this dumpster fire
    pages:
      - txt: "2024-02-26.html"

  - issue: "2024-05-20"
    date: 2024-10-20
    title: The Odd Siblings
    thumb: odd-siblings.png
    desc: <b>Prompt:</b> Write about brief encounters, fleeting moments, first impressions. what do these leave behind for us?
    pages:
      - txt: "2024-05-20.html"

  - issue: "2024-08-26"
    date: 2024-12-16
    title: Laundry Day
    desc: <b>Prompt:</b> Consider someone in your life that you have strong emotions for and think of some sensorial experiences (images) that you associate with them, then write from that!
    pages:
      - txt: "2024-08-26.html"

  - issue: "2024-10-28"
    date: 2025-05-27
    title: 50th Anniversary
    desc: >-
      <b>Prompt:</b> write about the skyвҖ” any aspect of it. color, feeling, temperature, shape (?), etc. write about a sky that inspires you or that exhausts you, or anything else youвҖҷd like
      
      <hr>
      
      Apologies for not posting anything for months. I had a lot of unfinished drafts and little to no free time,,
    pages:
      - txt: "2024-10-28.html"

  - issue: "2024-10-07"
    date: 2025-04-17
    title: Selective Seclusion
    thumb: birthday.png
    desc: >-
      <b>Prompt:</b> retell a story/moment/memory from your own life in a way you don't usually look at it

      <hr>
      
      This is a rewrite of the every first entry I made. It was rushed out and overall poor in quality.

      <br><br>
      [View Original Entry В»](#comic_after_1)<br>

      <span>From October 13, 2024</span>
    pages:
      - txt: "2024-10-07.html"
    after:
      - txt: "e/2024-10-07.html"
        hide: true

  - issue: "2024-12-09"
    date: 2025-05-27
    title: Electrodynamics
    desc: <b>Prompt:</b> write about someone you look up to or aspire to be like-- a role model of any kind. how do you relate to them? what about them resonates with you? is there anything you don't like about them?
    pages:
      - txt: "2024-12-09.html"

  - issue: "2024-12-16"
    date: 2025-09-07
    title: Food Noise
    desc: Sorry, a lot of my entries lately are lazy first person autobiographical stuff. I have a bunch of OC related ones that I'm trying to get my perfectionist ass to get done!!!
    pages:
      - txt: "2024-12-16.html"

  - issue: "2025-01-27"
    date: 2025-06-15
    title: You Suck Ass at Apologies
    desc: <b>Prompt:</b> Think about something that's physically overwhelming to you (in a good, bad, or neutral way) and write about it! this could be anything-- rollercoasters, concerts, sex, being sick, taking showers, going to the mall, or just being in a windy place
    pages:
      - txt: "2025-01-27.html"
    after:
      - img: "note-0.jpg,note-1.jpg"
        hide: true
      - txt: "e/2025-01-27-0.html"
        hide: true
      - txt: "e/2025-01-27-1.html"
        hide: true
      - txt: "e/2025-01-27-2.html"
        hide: true
      - txt: "e/2025-01-27-3.html"
        hide: true
      
