{%- for item in include.selected -%}
    {%- capture title -%}
        {{ item.title | default: item.filename }}{% if item.release %} ({{ item.release }}){% endif %}
    {%- endcapture -%}
    <a href="{{ item.url }}" title="{{ title }}" class="tier-thumb {%if item.path contains '/f/'%}with-review{% endif %}"><img src="./img/{{ item.slug | downcase }}.jpg" alt="thumbnail for {{ title }}" loading="lazy"></a>
{%- endfor -%}
