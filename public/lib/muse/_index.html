<link rel="stylesheet" href="/lib/main.css">
<style>
    body {
        overflow-x: hidden;
        background-color: white;
        max-width: 100vw;
    }

    #title {
        grid-area: title;
    }

    #list {
        grid-area: list;
    }

    #image {
        grid-area: img;
    }

    .main-container {
        margin: 8vw auto 1rem auto;
        max-width: 580px;
        width: 90%;
        padding: 10px;
        display: grid;
        grid-template-areas:
            "title title"
            "list img";
        grid-template-columns: 1fr 20%;
    }

    #list {
        z-index: 2;
    }

    #image {
        position: relative;
    }

    #image img {
        user-select: none;
        position: absolute;
        width: auto;
        height: 150%;
        max-height: 600px;
        top: 0;
        left: 0;
        transform: translateX(-20%) translateY(-20%) rotate(10deg);
        filter: drop-shadow(2px 0 0 var(--yellow))drop-shadow(-2px 0 0 var(--yellow))drop-shadow(0 2px 0 var(--yellow))drop-shadow(0 -2px 0 var(--yellow));
        z-index: 1;
    }

    .main-container h2 {
        background-color: var(--pink);
        padding: 4px;
        color: white;
    }

    #archive {
        width: 90%;
        max-width: 450px;
        margin: auto;
        margin-bottom: 8vw;
        padding: 1rem 0;
    }

    @media only screen and (max-width: 501px) {
        #image img {
            height: 130%;
            transform: translateX(-30%) translateY(-15%) rotate(10deg);
        }
    }

    #recentList {
        background-color: white;
        border: 3px solid var(--pink);
        transform: rotate(-1deg);
    }

    #recentList .comicListItem:hover {
        background-color: white;
    }

    #comicList .comicListItem:hover {
        background-color: var(--pink);
        color: white;
    }

    .comicListThumb {
        display: none;
    }
</style>
