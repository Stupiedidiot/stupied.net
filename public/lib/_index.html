<style>
{% capture css %}
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@100..700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Barriecito&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Leckerli+One&display=swap');

#container {
    max-width: 1200px!important;
}

#comicContainer .item-container{
    .psych{
        --display-font:"Barriecito";
        overflow: hidden;
        color:white;
        background-color: #1b1a18;
        font-family: "M PLus 1 Code";
        .item-title {color:#d6a95c;}
        .item-thumb{
            flex:2;
            margin-left:-10%;
            transform:skew(10deg);
            overflow: hidden;
            img{transform: skew(-10deg) scale(120%);}
        }
        .item-desc{margin-left:0.5rem;}
        .item-link{margin-left:1rem;}
    }

    .muse {
        --yellow:#efe4b0;
        --light-pink:#edb18b;
        --pink:#ed4d46;
        background-color: var(--yellow);
        background-size: 20px 20px;
        background-image: 
        repeating-linear-gradient(0deg, var(--light-pink), var(--light-pink) 2px, var(--yellow) 2px, var(--yellow));
    }

    .muse .item-thumb{
        flex:0;
        position: relative;
        img{
            position: absolute;
            width:5rem;
            height: unset;
            z-index:1;
            transform: scale(130%) rotate(-15deg) translateX(-10%);
            filter: drop-shadow(1px 0 0 var(--yellow)) drop-shadow(-1px 0 0 var(--yellow)) drop-shadow(0 1px 0 var(--yellow)) drop-shadow(0 -1px 0 var(--yellow));
        }
    }
    .muse .item-side > div{
        padding:0.5rem;
    }
    .muse .item-title > *{
        color:white;
        background-color:var(--pink);
        padding:8px;
        margin-bottom:0.5rem;
        padding-left:5rem;
    }
    .muse  .item-desc{margin-left:5rem;margin-right:0.5rem;}
    .muse  .item-link{margin-left:5.5rem;color:var(--pink);}

    .askal { background-color: #edeeff; }
    .askal .item-thumb img{
        height: auto;
        width: auto;
        max-height: 100%;
        max-width:150px;
        transform: scale(110%);
        --color:#edeeff;
        --width:2px;
        filter:drop-shadow(var(--width)0 0 var(--color))drop-shadow(calc(-1*var(--width))0 0 var(--color))drop-shadow(0 var(--width)0 var(--color))drop-shadow(0 calc(-1*var(--width)) 0 var(--color))
    }
    .askal .item-desc { color:#6faccc; }
}

#comicContainer{
    box-sizing: border-box;
    width: 98%;
    margin: auto;

    .item-container > div{
        display:flex;
        background-color:white;
        max-width: 700px;
        margin: auto;
        border: 3px solid black;
        margin-bottom: 0.5rem;
    }
    .item-thumb{flex:1;}
    .item-thumb img{
        width: 100%;height:100%;
        object-fit: cover;
        display: block;
    }

    .item-side {flex:2;position:relative;}

    .item-side > div {
        padding:1rem;
        position: relative;
        top:50%;transform: translateY(-50%);
    }
    .item-link{margin-top:1rem;}

    a {font-weight: bolder;font-family: var(--display-font);}

    a:after {
        opacity: 0;
        transform: translateX(-100%);
        position: absolute;
        display:inline-block;
        margin-left: 0.5rem;
        content: " »";
        transition: 0.1s;
    }

    a:hover:after{
        opacity: 1;
        transform: none;
    }
}

@media only screen and (min-width: 600px) {
    #comicContainer{columns:2;}
}

@media only screen and (min-width: 900px) {
    #comicContainer{columns:3;}
}
{% endcapture %}
{{ css | scssify }}
</style>
