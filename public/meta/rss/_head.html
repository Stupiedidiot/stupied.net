<script src="/meta/js/tooltip.js" defer></script>
<style>
{% capture css %}
h1 {
    font-size: 3.5rem;
    position: absolute;
    top: -1rem; left: 0;
    z-index: 1;
}

#board {
    margin: 1rem auto;
    background-image: url(./img/board.jpg);
    background-size: 95%;
    aspect-ratio: 3/2;
    background-repeat: no-repeat;
    background-position: center;
    max-height: 98vh;
    position: relative;
    user-select: none;
}

.note {
    position: absolute;
    background-color: white;
    padding: 0.5%;
    box-shadow: 0 0 10px #4e2009;
}

#main {
    width: 30%;
    top: 10%;
    left: 8%;
    transform: rotate(-3deg);
}

#blog {
    width: 25%;
    top: 35%;
    left: 30%;
}

#art {
    display: none;
    /* width: 25%;
    top: 45%;
    left: 20%; */
}

#template {
    width: 20%;
    top: 55%;
    left: 15%;
    transform: rotate(3deg);
}

.note img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    display: block;
}

.rss-item {
    display: block;
    margin-bottom: 0.5rem;
    break-inside: avoid;
    padding: 0.5rem;
    &:hover h3 { color: var(--color-accent) }
}

/* RSS FEED START */
#rss { margin-top: 1rem; padding: 1rem; }
#feed .tooltip > span > img { max-height: 60vh; display: block; }

.feed-item {
    display: flex;
    gap: 0.5rem;
    border: 1px solid;
    margin-bottom: 1rem;
}

.feed-thumb {
  flex: 40%;
  background-size: cover;
  background-position: 50% 50%;
}
.feed-thumb > img {
    height: 100%;
    width: 100%;
    object-fit: cover;
}

.tooltip img {
    max-width: 100%;
    max-height: 90vh;
}

.feed-info {
    flex: 60%;
    padding: 2rem 0.5rem;
}

.feed-date { color: var(--color-accent); }

.feed-desc img { display: none; }
.feed-desc > p:last-of-type { margin-bottom: 1rem; }
.feed-desc ul { padding-left: 1.5rem; }

.feed-desc > a:last-child, .feed-desc li > a {
    display: inline-block;
    font-family: var(--display-font);
    font-weight: bold;
}

.hidden {display: none;}
#feed_buttons button {
  margin-top: 0.5rem;
  background-color: black;
  border-radius: 5px;
  margin-right: 0.5rem;
  border: none;
  color: white;
  padding: 0.5rem;
}
/* RSS FEED END */

{% endcapture %}
{{ css | scssify}}
</style>
