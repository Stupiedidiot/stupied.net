<style>
:root {
    --yellow: #ffcb67;
    --orange: #ec7239;
    --gray: #6c6371;
    --blue: #44a3c6;
    --dark-blue: #142943;
    --darker-blue:#0d0d1f;
    --darkest-blue:#0c0716;
    --color-accent: var(--yellow);
}
body { min-width: 300px;}
h2 { color: var(--yellow);}

body {
    max-width: 100vw;
    overflow-x: hidden;
    background-color: var(--dark-blue);
    background-image: url(./img/scribble.png);
    color: white;
}

#container #home { grid-area: home; }
#container main { grid-area: main; }
#container aside { grid-area: aside; }
#container footer { grid-area: footer; }

#container {
    display: grid;
    grid-template:
    'main home' 
    'main aside'
    'footer footer';
    grid-template-columns: 60% 40%;
    grid-template-rows: auto 1fr;
    max-width: 1800px;
    margin: auto;
}

#home a {
    margin-left: auto;
    display: block;
    background: url(./img/sunburst-gray.svg), radial-gradient(circle at 50% 50%, rgba(108, 99, 113, 1) 0%, rgba(236, 114, 57, 1) 35%, rgba(236, 114, 57, 1) 72%, rgba(108, 99, 113, 1) 100%);
    background-size: 130%;
    background-position: -20% 25%;
}

#home a:hover { background: var(--orange); }

#home img {
    width: 100%;
    display: block;
}

main { 
    padding: 2rem ;
    padding-bottom: 0 ;
}

#top{
    margin:auto;
    margin-bottom: 1rem;
    display: flex;
    gap:1rem;
    width:max-content;
}

#updateStatus {
    position: relative;
    padding-left:1rem;
    border-left:3px solid white;
}

#updateStatus div {
    position: relative;top:50%;transform: translateY(-50%);
}

#updateStatus p {
    font-weight:bold;
    font-family:grandstander;
    margin-bottom:0;
}

#lastupdate { color:var(--yellow); }

#timeline img { width: 100%; }
.timeline-item {
    display: block;
    break-inside: avoid;
    margin-bottom: 1rem;
    background-color: var(--darker-blue);
    border: 2px solid black;
    transition: 0.2s;
    color: white!important;
}
.timeline-item:hover { outline: 3px solid var(--orange); }
.timeline-item > div { padding: 1rem;}

@media only screen and (max-width: 700px) {
    #container { display: block; }
    #date{display: block;}
}

@media only screen and (max-width: 450px) {
    #top{display: block;}
    #updateStatus div{all:revert;}
}

a:hover { color: var(--orange); }

aside { padding: 1rem; }

aside > div { margin-bottom: 2rem; }

footer.default-footer{
    color: var(--gray);
    padding: 2rem;
    user-select: none;
}
footer a:hover {color:white;}
#button { margin-top: 1rem; }
</style>
