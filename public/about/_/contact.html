<style>
#note {
    border: 2px solid black;
    padding: 1.5rem 1rem!important;
    position: relative;
    background-color: white;
    transition: 0.2s;
    margin-bottom: 2rem!important;
    clear: both;
    height: fit-content;
}

#note::before, #note::after {
    content: "";
    display: block;
    position: absolute;
    width: 100%;
    height: 0.5rem;
    left: 0;
    background-image: linear-gradient(45deg, #3a8ac7 20.83%, #ffffff 20.83%, #ffffff 25%, #ed374f 25%, #ed374f 45.83%, #fff 45.83%, #fff 50%, #3a8ac7 50%, #3a8ac7 70.83%, #ffffff 70.83%, #ffffff 75%, #ed374f 75%, #ed374f 95.83%, #fff 95.83%, #fff 100%);
    background-size: 67.88px 67.88px;
}
#note::before {
    border-bottom: 1px solid black;
    top: 0;
}
#note::after {
    border-top: 1px solid black;
    bottom: 0;
}

/* Main */
#contact_widget {
    --text-color: black;
    --bg-color: none;
    --form-color: black;
    --form-bg: white;
    --form-border: lightgray;
    --margin-bottom: 0.8rem;
    --padding: 0.5rem;
    box-sizing: border-box;
    height: 100%;
    overflow: hidden;
    font-family: var(--body-font);
    color: var(--text-color);
}

#contact_widget button, #contact_widget input[type=submit] {
    font-family: var(--body-font);
    text-decoration: none;
	text-align: center;
    text-transform: uppercase;
    color: var(--form-color);
    font-family: var(--display-font);
    background-color: var(--form-bg);
    border: 1px solid gray;
    border-radius: 0.2rem;
}
#contact_widget button:hover, #contact_widget input[type=submit]:hover {
    color: var(--color-accent);
    border: 1px solid var(--color-accent);
}
#contact_widget button:disabled, #contact_widget input[type=submit]:disabled {opacity: 60%;}
#contact_widget button:disabled:hover, #contact_widget input[type=submit]:disabled:hover {
    color: var(--color-accent);
}

/* Input section */
#c_inputDiv {
    margin-bottom: var(--margin-bottom);
    padding: var(--padding);
    background-color: var(--bg-color);
}

.c-label{ font-family: var(--display-font);}

.c-inputWrapper {
    display: flex;
    margin-bottom: 0.5rem;
    gap: 0.5rem;
}

.c-input, .c-textInput {
     background-color: var(--form-bg);
     border: 1px solid var(--form-border);
}

.c-input {
    padding: 4px;
    color:  var(--form-color);
	outline: none;
    font-family: var(--body-font);
}

.c-inputWrapper { flex-wrap: wrap;}
.c-input {flex:1;}

#c_textWrapper { display: block; }
.c-textInput { 
    width: calc(100% - 0.5rem);
    resize: vertical;
}
#c_submitButton {
    margin-left: auto; 
    margin-right: 0;
}

.hidden:not(:target) { display: none; }
.disclaimer { opacity: 0.2; }
#disclaimer li {margin-bottom: 0.5rem;}
#disclaimer li strong { font-family: var(--display-font);}
#disclaimer li > strong::after { content: " » "; }
</style>
<script src="./contact.js" defer></script>
