<style>
.db-list > * { break-inside: avoid; }

#table, #grayscale{
    border: 2px solid black;
    padding: 1rem;
}

#grayscale {
    height: 100px;
    position: relative;
    background-image: linear-gradient(90deg, white, black);
    user-select: none;
    margin-bottom: 1rem;
    padding: 0;
}

#grayscale::after {
    content: "";
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background-color: gray;
    display: block;
    width: 100%;
    height: 33%;
}

.justified-gallery { --min-height: 10px;}
.gray {filter: saturate(0);}

.demo input { width: 0rem; }
.colorswatch {
    background-color: var(--color);
    display: block;
    width: 100%;
    aspect-ratio: 1/1;
}

#relativity-demo { margin-bottom: 1rem; }
#relativity-output { display: flex; gap: 1rem;margin-bottom: 0.5rem; }
#relativity-output > div {padding: 10%;}

#shifts-output > .colorswatch { position: relative; aspect-ratio: 6/1;}
#shifts-demo .colorswatch > * { 
    aspect-ratio: unset; 
    height: 100%; width: 33%;
    position: absolute;
    opacity: 0.5;
}
#shifts-input h4, #saturation-input h4 {display: inline-block; margin: 1rem auto;}
</style>
<script type="text/javascript" src="/meta/js/jscolor.js" defer></script>
<script>
document.onload = ()=>{
    jscolor.presets.default = {palette:'#0344a6\n#03A6A1\n#FFE3BB\n#FFA673\n#FF4F0F\n#FFFFFF\n#8b8680\n#000000'};
}
</script>
