<style>
body {

}

}

header ,footer {

}

#yr-2025 {

    }

    grid-template-columns: repeat(2, 1fr);

        background-size: cover;

        display: block;

        overflow: hidden;
    }
    a:not([href="#"]):hover {

        text-shadow: 0 0 3px;
    }
}

    #yr-2025 { display: flex; }
}

@media (min-width:700px) {
    #yr-2025 { min-height: 100vh; }
    .calender{
        grid-template-columns: repeat(7, 1fr);
