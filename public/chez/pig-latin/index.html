function toPigText(){
	if(!INPUT.value.length > 0) return;
	let words = INPUT.value.toLowerCase().split(" ");
	let result = '';
	words.forEach(word => {
		result += toPigWord(word) + ' ';
	});
	console.log(result);
	OUTPUT.value = result;
}

function toPigWord(value) {
	let result;
	console.log(checkVowel(value[0]))
	
	if(checkVowel(value[0])){
		let ctr = value.length - 1;
		while(ctr > 1){
			if (checkSpChars(value[ctr]) == true) ctr--;
			else break;
		}
		result = value.slice(0, ctr + 1) + "way" + value.slice(ctr, value.length - 1);
	} else {
		let chars = [];
		for (let ctr = 0; ctr < value.length; ctr++) {
			if (checkVowel(value[ctr]) == true) break;
			if (checkSpChars(value[ctr]) == true) continue;
			chars.push(value[ctr]);
		}

		console.log(chars)

		let ctr = value.length - 1;
		while(ctr > 1){
			if (checkSpChars(value[ctr]) == true) ctr--;
			else break;
		}

		result = value.slice(0, ctr);
		chars.forEach(char => {
			result = result.replace(char, '');
			result = result + char;
		});
		result = result + 'ay' + value.slice(ctr, value.length);
	}
	return result;
}

function toNormWord(value) {
	let result,
		 last = value.split(value.length - 3, value.length);
	if(last === 'way' || last === 'yay'){
		result = value.slice(0, value.length - 3);
	} else {
		result = value.slice(0, value.length - 2);
		let test = CLUSTERS.some(cluster => result.endsWith(cluster));
	}
	return result;
}

const VOWELS = 'aeiou';
function checkVowel(e){
	if(VOWELS.includes(e)) return true;
	else return false;
}

const SPCHAR = /[^\w\s]/;
function checkSpChars(value) {
	let test = SPCHAR.test(value);
	return test;
}
